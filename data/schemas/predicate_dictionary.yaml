# Rečnik činjenica — UGOVOR između Člana 1 (pravila) i Člana 2 (NLP, CBR)
#
# Verzija: 0.3.0
# Poslednja izmena: 2026-06-06
#
# CHANGE LOG od 0.2.0:
#   - pollutionTarget: dodato SUMA kao validnu vrednost, plus alias TLO -> ZEMLJISTE
#   - substanceType: dodato OPASNE_MATERIJE, DRVO, ZIVOTINJE_RIBE (NLP ekstrahuje)
#   - ecologicalDamage: alias VELIKA -> VELIKIH_RAZMERA, MALA -> OBICNA (za NLP)
#   - Novi: damageExtent (sirov NLP izlaz, ne koristi se u pravilima direktno)
#   - Novi: forestAreaHa (za čl. 274, 275 - pustošenje šuma)
#   - Novi: articleViolated, sentenceType, sentenceMonths kao "izvedeni metapodaci iz odluke"
#     (NLP ih ekstrahuje iz POSTOJEĆE presude, NE iz opisa novog slučaja)
#
# DOGOVOR SA ČLANOM 2 (NLP):
#   NLP vraća svoje vrednosti (TLO, VELIKA, MALA, ...). Pravila koriste
#   kanonske vrednosti (ZEMLJISTE, VELIKIH_RAZMERA, OBICNA, ...).
#   Mapiranje radi CaseController (cleanFacts metoda) - alias se prevodi
#   pre nego što činjenice udju u Drools.

version: "0.3.0"

predicates:

  # ============================================================
  # OSNOVNI KVALIFIKATORI ZAGADJENJA (čl. 260)
  # ============================================================

  pollutionExtent:
    type: enum
    values: [MANJA_MERA, VECA_MERA]
    description: "Da li je zagadjenje 'u većoj meri' kako KZ kvalifikuje"
    used_in_rules: [R1, R2]
    cbr_key: true
    cbr_weight: 0.15
    similarity:
      type: ordinal
      order: [MANJA_MERA, VECA_MERA]

  pollutionScope:
    type: enum
    values: [UZI_PROSTOR, SIRI_PROSTOR]
    description: "Da li je zagadjenje 'na širem prostoru' kako KZ kvalifikuje"
    used_in_rules: [R1, R2]
    cbr_key: true
    cbr_weight: 0.10
    similarity:
      type: ordinal
      order: [UZI_PROSTOR, SIRI_PROSTOR]

  pollutionTarget:
    type: enum
    # Kanonske vrednosti koje pravila koriste:
    values: [VAZDUH, VODA, ZEMLJISTE, VISESTRUKO, SUMA]
    # NLP aliases - NLP ekstrahuje TLO, pravila ga vide kao ZEMLJISTE:
    nlp_aliases:
      TLO: ZEMLJISTE
    description: "Šta je zagadjeno (vazduh/voda/zemljište/šuma)"
    used_in_rules: [R1]
    cbr_key: true
    cbr_weight: 0.10

  violatedEnvironmentalRegs:
    type: boolean
    description: "Da li je učinilac kršio propise o zaštiti životne sredine"
    used_in_rules: [R1]
    cbr_key: false

  intent:
    type: enum
    values: [UMISLJAJ, NEHAT]
    description: "Oblik krivice (čl. 260 st. 1 - umišljaj, st. 2 - nehat)"
    used_in_rules: [R1, R2, R3, R4]
    cbr_key: true
    cbr_weight: 0.15

  # ============================================================
  # KVALIFIKOVANI OBLICI - posledice (čl. 260 st. 3, 4)
  # ============================================================

  ecologicalDamage:
    type: enum
    values: [NEMA, OBICNA, VELIKIH_RAZMERA]
    # NLP ekvivalenti - mapiraju se na kanonske vrednosti:
    nlp_aliases:
      VELIKA: VELIKIH_RAZMERA
      MALA: OBICNA
    description: "Uništenje/oštećenje životinjskog ili biljnog sveta"
    used_in_rules: [R3, R4]
    cbr_key: true
    cbr_weight: 0.15
    similarity:
      type: ordinal
      order: [NEMA, OBICNA, VELIKIH_RAZMERA]

  damageRemovalDifficulty:
    type: enum
    values: [JEDNOSTAVNO, ZAHTEVNO]
    description: "Da li su za otklanjanje potrebni 'duže vreme ili veliki troškovi'"
    used_in_rules: [R3, R4]
    cbr_key: true
    cbr_weight: 0.10

  # ============================================================
  # SUBJEKT KRIVIČNOG DELA (čl. 261, 262)
  # ============================================================

  perpetratorType:
    type: enum
    values: [OBICAN, SLUZBENO_LICE, ODGOVORNO_LICE]
    description: "Tip učinioca"
    used_in_rules: [R5, R6, R7]
    cbr_key: true
    cbr_weight: 0.10

  failedToTakeProtectiveMeasures:
    type: boolean
    description: "Nije preduzeo propisane mere zaštite (čl. 261)"
    used_in_rules: [R5]
    cbr_key: false

  unauthorizedConstruction:
    type: boolean
    description: "Dozvolio izgradnju zagađujućih objekata (čl. 262)"
    used_in_rules: [R6]
    cbr_key: false

  # ============================================================
  # OSTECENJE OBJEKATA ZASTITE (čl. 263)
  # ============================================================

  damagedProtectionEquipment:
    type: boolean
    description: "Oštetio/uništio objekte za zaštitu životne sredine"
    used_in_rules: [R7]
    cbr_key: false

  # ============================================================
  # ZASTICENA PRIRODNA DOBRA I VRSTE (čl. 265)
  # ============================================================

  destroyedProtectedNaturalAsset:
    type: boolean
    description: "Uništio/oštetio posebno zaštićeno prirodno dobro (čl. 265 st. 1)"
    used_in_rules: [R8]
    cbr_key: false

  illegalSpeciesTraffic:
    type: boolean
    description: "Protivpravno iznošenje zaštićene vrste (čl. 265 st. 3)"
    used_in_rules: [R9]
    cbr_key: false

  # ============================================================
  # OPASNE MATERIJE (čl. 266)
  # ============================================================

  dangerousSubstanceAction:
    type: boolean
    description: "Unos/prevoz/prerada/odlaganje opasnih materija"
    used_in_rules: [R10, R11]
    cbr_key: false

  officialPositionAbuse:
    type: boolean
    description: "Zloupotreba službenog položaja (čl. 266 st. 2)"
    used_in_rules: [R11]
    cbr_key: false

  organizesCrime:
    type: boolean
    description: "Organizuje vršenje dela (čl. 266 st. 5)"
    used_in_rules: [R12]
    cbr_key: false

  # ============================================================
  # NUKLEARNA POSTROJENJA I INFORMISANJE (čl. 267, 268)
  # ============================================================

  unauthorizedNuclearFacility:
    type: boolean
    description: "Nedozvoljena izgradnja nuklearnog postrojenja (čl. 267)"
    used_in_rules: [R13]
    cbr_key: false

  deniedEnvironmentalInfo:
    type: boolean
    description: "Uskratio podatke o stanju životne sredine (čl. 268)"
    used_in_rules: [R14]
    cbr_key: false

  # ============================================================
  # DODATNE CINJENICE (za CBR sličnost, ne za pravila)
  # ============================================================

  substanceQuantityM3:
    type: number
    unit: "m^3"
    description: "Količina ispuštene supstance"
    used_in_rules: []
    cbr_key: true
    cbr_weight: 0.10

  substanceType:
    type: enum
    # Kanonske vrednosti + NLP ekstrahovane (sve jednake):
    values:
      - HEMIJSKI_OTPAD
      - RADIOAKTIVNI_OTPAD
      - KOMUNALNI_OTPAD
      - NAFTNI_DERIVATI
      - OPASNE_MATERIJE        # NLP - generička kategorija (otrov, kiselina)
      - DRVO                   # NLP - šumske krađe (čl. 274, 275)
      - ZIVOTINJE_RIBE         # NLP - lov i ribolov (čl. 276, 277)
      - OSTALO
    description: "Tip supstance ili predmeta krivičnog dela"
    used_in_rules: []
    cbr_key: true
    cbr_weight: 0.05
    similarity:
      type: taxonomy
      hierarchy:
        OPASAN: [HEMIJSKI_OTPAD, RADIOAKTIVNI_OTPAD, NAFTNI_DERIVATI, OPASNE_MATERIJE]
        PRIRODNI: [DRVO, ZIVOTINJE_RIBE]
        BENIGN: [KOMUNALNI_OTPAD, OSTALO]

  damageExtent:
    type: enum
    values: [MALA, VELIKA]
    description: "Sirov obim štete iz NLP ekstrakcije. Pravila ne koriste direktno - ide kroz mapiranje u ecologicalDamage."
    used_in_rules: []
    cbr_key: true
    cbr_weight: 0.10
    similarity:
      type: ordinal
      order: [MALA, VELIKA]

  forestAreaHa:
    type: number
    unit: "ha"
    description: "Površina pustošene šume (čl. 274, 275) - informativno"
    used_in_rules: []
    cbr_key: true
    cbr_weight: 0.10

  priorConviction:
    type: boolean
    description: "Prethodno osuđivan (otežavajuća okolnost)"
    used_in_rules: []
    cbr_key: true
    cbr_weight: 0.05

  remediedDamage:
    type: boolean
    description: "Otklonio štetu pre suđenja (olakšavajuća okolnost)"
    used_in_rules: []
    cbr_key: true
    cbr_weight: 0.05

  # ============================================================
  # IZVEDENI METAPODACI IZ ODLUKE (NLP iz već donesene presude)
  # ============================================================
  # NLP ekstrahuje iz POSTOJEĆE presude, ne iz opisa novog slučaja.
  # Koriste se za CBR (poređenje sa prethodnim odlukama), NE ulaze u pravila.

  articleViolated:
    type: string
    description: "eId prekršenog člana (NLP iz presude). Ishod, ne ulaz."
    used_in_rules: []
    cbr_key: false
    output_only: true

  sentenceType:
    type: enum
    values: [ZATVOR, NOVCANA, USLOVNA, RAD_U_JAVNOM_INTERESU]
    description: "Vrsta izrečene kazne (NLP iz presude). Ishod."
    used_in_rules: []
    cbr_key: false
    output_only: true

  sentenceMonths:
    type: number
    description: "Trajanje kazne u mesecima (NLP iz presude). Ishod."
    used_in_rules: []
    cbr_key: false
    output_only: true

  # ============================================================
  # IZVEDENI PREDIKATI (rezultat pravila)
  # ============================================================

  violates:
    type: relation
    arity: 2
    description: "Lice X krši član Y"
    derived: true

  sentenceRange:
    type: relation
    arity: 3
    description: "Predloženi raspon kazne"
    derived: true

  applicableArticle:
    type: relation
    arity: 2
    description: "Identifikovani primenljiv član"
    derived: true
