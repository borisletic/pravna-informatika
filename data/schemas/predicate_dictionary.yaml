# Rečnik činjenica — UGOVOR između Člana 1 (pravila) i Člana 2 (NLP, CBR)
#
# Verzija: 0.2.0
# Poslednja izmena: posle analize KZ čl. 260-268
#
# CHANGE LOG od 0.1.0:
#   - Dodato: pollutionExtent (manja/veća mera) - kritično za R1
#   - Dodato: pollutionScope (uži/širi prostor)
#   - Dodato: ecologicalDamage (uništenje velikih razmera) - za kvalifikovane oblike
#   - Dodato: damageRemovalDifficulty (duže vreme/veliki troškovi)
#   - Dodato: perpetratorType (običan učinilac / službeno lice)
#   - Dodato: substanceDanger (radioaktivna/opasna)
#   - Dodato: dangerousSubstanceAction (unos/prevoz/prerada/odlaganje/skladištenje)
#   - Dodato: officialPositionAbuse (zloupotreba službenog položaja)
#   - Dodato: organizesCrime (organizuje vršenje dela)
#   - Promenjeno: substanceQuantityM3 je sad samo informativni, ne ulazi u pravila
#     (jer KZ ne navodi konkretne količine - to je za CBR)
#   - Dodato: enum SubstanceTarget razdvojen od pollutionTarget

version: "0.2.0"

predicates:

  # ============================================================
  # OSNOVNI KVALIFIKATORI ZAGADJENJA (čl. 260)
  # ============================================================

  pollutionExtent:
    type: enum
    values: [MANJA_MERA, VECA_MERA]
    description: "Da li je zagadjenje 'u većoj meri' kako KZ kvalifikuje"
    used_in_rules: [R1, R2]
    cbr_key: true
    cbr_weight: 0.15
    similarity:
      type: ordinal
      order: [MANJA_MERA, VECA_MERA]

  pollutionScope:
    type: enum
    values: [UZI_PROSTOR, SIRI_PROSTOR]
    description: "Da li je zagadjenje 'na širem prostoru' kako KZ kvalifikuje"
    used_in_rules: [R1, R2]
    cbr_key: true
    cbr_weight: 0.10
    similarity:
      type: ordinal
      order: [UZI_PROSTOR, SIRI_PROSTOR]

  pollutionTarget:
    type: enum
    values: [VAZDUH, VODA, ZEMLJISTE, VISESTRUKO]
    description: "Šta je zagadjeno (vazduh/voda/zemljište iz čl. 260 st. 1)"
    used_in_rules: [R1]
    cbr_key: true
    cbr_weight: 0.10

  violatedEnvironmentalRegs:
    type: boolean
    description: "Da li je učinilac kršio propise o zaštiti životne sredine"
    used_in_rules: [R1]
    cbr_key: false

  intent:
    type: enum
    values: [UMISLJAJ, NEHAT]
    description: "Oblik krivice (čl. 260 st. 1 - umišljaj, st. 2 - nehat)"
    used_in_rules: [R1, R2, R3, R4]
    cbr_key: true
    cbr_weight: 0.15

  # ============================================================
  # KVALIFIKOVANI OBLICI - posledice (čl. 260 st. 3, 4)
  # ============================================================

  ecologicalDamage:
    type: enum
    values: [NEMA, OBICNA, VELIKIH_RAZMERA]
    description: "Uništenje/oštećenje životinjskog ili biljnog sveta"
    used_in_rules: [R3, R4]
    cbr_key: true
    cbr_weight: 0.15
    similarity:
      type: ordinal
      order: [NEMA, OBICNA, VELIKIH_RAZMERA]

  damageRemovalDifficulty:
    type: enum
    values: [JEDNOSTAVNO, ZAHTEVNO]
    description: "Da li su za otklanjanje potrebni 'duže vreme ili veliki troškovi'"
    used_in_rules: [R3, R4]
    cbr_key: true
    cbr_weight: 0.10

  # ============================================================
  # SUBJEKT KRIVIČNOG DELA (čl. 261, 262 - službeno lice)
  # ============================================================

  perpetratorType:
    type: enum
    values: [OBICAN, SLUZBENO_LICE, ODGOVORNO_LICE]
    description: "Tip učinioca - obični ili službeno/odgovorno lice"
    used_in_rules: [R5, R6, R7]
    cbr_key: true
    cbr_weight: 0.10

  failedToTakeProtectiveMeasures:
    type: boolean
    description: "Službeno/odgovorno lice nije preduzelo propisane mere zaštite (čl. 261)"
    used_in_rules: [R5]
    cbr_key: false

  unauthorizedConstruction:
    type: boolean
    description: "Dozvolio izgradnju/upotrebu objekata koji zagadjuju (čl. 262)"
    used_in_rules: [R6]
    cbr_key: false

  # ============================================================
  # OŠTEĆENJE OBJEKATA ZAŠTITE (čl. 263)
  # ============================================================

  damagedProtectionEquipment:
    type: boolean
    description: "Oštetio/uništio objekte ili uređaje za zaštitu životne sredine"
    used_in_rules: [R7]
    cbr_key: false

  # ============================================================
  # ZAŠTIĆENA PRIRODNA DOBRA I VRSTE (čl. 265)
  # ============================================================

  destroyedProtectedNaturalAsset:
    type: boolean
    description: "Uništio/oštetio posebno zaštićeno prirodno dobro (čl. 265 st. 1)"
    used_in_rules: [R8]
    cbr_key: false

  illegalSpeciesTraffic:
    type: boolean
    description: "Protivpravno iznošenje/unošenje zaštićene vrste (čl. 265 st. 3)"
    used_in_rules: [R9]
    cbr_key: false

  # ============================================================
  # OPASNE MATERIJE (čl. 266)
  # ============================================================

  dangerousSubstanceAction:
    type: boolean
    description: "Unos/prevoz/prerada/odlaganje/sakupljanje/skladištenje opasnih materija"
    used_in_rules: [R10, R11]
    cbr_key: false

  officialPositionAbuse:
    type: boolean
    description: "Zloupotreba službenog položaja (čl. 266 st. 2)"
    used_in_rules: [R11]
    cbr_key: false

  organizesCrime:
    type: boolean
    description: "Organizuje vršenje dela (čl. 266 st. 5)"
    used_in_rules: [R12]
    cbr_key: false

  # ============================================================
  # NUKLEARNA POSTROJENJA I INFORMISANJE (čl. 267, 268)
  # ============================================================

  unauthorizedNuclearFacility:
    type: boolean
    description: "Odobrio/pristupio izgradnji nuklearnog postrojenja bez propisa (čl. 267)"
    used_in_rules: [R13]
    cbr_key: false

  deniedEnvironmentalInfo:
    type: boolean
    description: "Uskratio/dao neistinite podatke o stanju životne sredine (čl. 268)"
    used_in_rules: [R14]
    cbr_key: false

  # ============================================================
  # DODATNE INFORMATIVNE ČINJENICE (za CBR i NLP)
  # ============================================================

  substanceQuantityM3:
    type: number
    unit: "m^3"
    description: "Količina ispuštene supstance (informativno, ne ulazi u pravila jer KZ ne specifira pragove)"
    nlp_patterns:
      - '\d+(?:[.,]\d+)?\s*(?:m³|m3|kubnih metara|кубних метара)'
    used_in_rules: []
    cbr_key: true
    cbr_weight: 0.10

  substanceType:
    type: enum
    values:
      - HEMIJSKI_OTPAD
      - RADIOAKTIVNI_OTPAD
      - KOMUNALNI_OTPAD
      - NAFTNI_DERIVATI
      - OSTALO
    description: "Tip ispuštene supstance (informativno + za CBR sličnost)"
    used_in_rules: []
    cbr_key: true
    cbr_weight: 0.05
    similarity:
      type: taxonomy
      hierarchy:
        OPASAN: [HEMIJSKI_OTPAD, RADIOAKTIVNI_OTPAD, NAFTNI_DERIVATI]
        BENIGN: [KOMUNALNI_OTPAD, OSTALO]

  priorConviction:
    type: boolean
    description: "Prethodna osuda za isto/slično delo (otežavajuća okolnost)"
    used_in_rules: []
    cbr_key: true
    cbr_weight: 0.05

  remediedDamage:
    type: boolean
    description: "Učinilac otklonio štetu pre suđenja (olakšavajuća okolnost)"
    used_in_rules: []
    cbr_key: true
    cbr_weight: 0.05

  # ============================================================
  # IZVEDENI PREDIKATI (ne ekstrahuje NLP - izvode pravila)
  # ============================================================

  violates:
    type: relation
    arity: 2
    description: "Lice X krši član Y (npr. art_260__para_1)"
    derived: true

  sentenceRange:
    type: relation
    arity: 3
    description: "Predloženi raspon kazne (od, do) u mesecima za lice X"
    derived: true

  applicableArticle:
    type: relation
    arity: 2
    description: "Identifikovani primenljiv član za slučaj"
    derived: true
