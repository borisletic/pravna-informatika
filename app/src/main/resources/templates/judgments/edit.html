<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="sr">
<head>
    <meta charset="UTF-8"/>
    <title>Ažuriranje ekstrahovanih podataka</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container"><a class="navbar-brand" th:href="@{/}">Pravna informatika</a></div>
</nav>
<main class="container mt-4">
    <a th:href="@{'/judgments/' + ${judgmentId}}" class="btn btn-sm btn-outline-secondary">&larr; Nazad na odluku</a>
    <h1 class="mt-3">Ručno ažuriranje — <span th:text="${judgmentId}">id</span></h1>
    <p class="text-muted">Ispravite automatski ekstrahovane metapodatke i pravne činjenice.
        Sačuvane vrednosti imaju prednost pri prikazu i rasuđivanju.</p>

    <form th:action="@{'/judgments/' + ${judgmentId} + '/edit'}" method="post">
        <div class="card mb-4">
            <div class="card-header">Metapodaci</div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Broj predmeta</label>
                        <input class="form-control" name="caseNumber" th:value="${judgment.caseNumber}"/>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label">Sud</label>
                        <input class="form-control" name="court" th:value="${judgment.court}"/>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Datum (YYYY-MM-DD)</label>
                        <input class="form-control" name="date"
                               th:value="${judgment.date != null} ? ${#temporals.format(judgment.date,'yyyy-MM-dd')} : ''"/>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Sudije (jedna po redu)</label>
                        <textarea class="form-control" name="judgesText" rows="4" th:text="${judgesText}"></textarea>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Zapisničar</label>
                        <input class="form-control" name="recorder" th:value="${judgment.recorder}"/>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Stranke (ULOGA INICIJALI, po redu)</label>
                        <textarea class="form-control" name="partiesText" rows="4"
                                  th:text="${partiesText}" placeholder="OKR AA"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header">Pravne činjenice (NLP — ručno ispravljivo)</div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4" th:each="pred : ${predicates}">
                        <label class="form-label" th:text="${pred}">predikat</label>
                        <input class="form-control" th:name="'fact_' + ${pred}"
                               th:value="${factValues.get(pred)}"/>
                    </div>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Sačuvaj ispravke</button>
        <a th:href="@{'/judgments/' + ${judgmentId}}" class="btn btn-outline-secondary">Odustani</a>
    </form>
</main>
</body>
</html>
