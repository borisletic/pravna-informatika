<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="sr">
<head>
    <meta charset="UTF-8"/>
    <title>Odluka</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container"><a class="navbar-brand" th:href="@{/}">Pravna informatika</a></div>
</nav>
<main class="container mt-4">
    <a th:href="@{/judgments}" class="btn btn-sm btn-outline-secondary">&larr; Sve odluke</a>
    <a th:href="@{'/judgments/' + ${judgmentId} + '/edit'}" class="btn btn-sm btn-primary float-end">
        Ažuriraj ekstrahovane podatke
    </a>
    <h1 class="mt-3" th:text="'Odluka: ' + ${judgmentId}">Odluka</h1>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <!-- Ekstrahovani metapodaci + činjenice (Celina 4/7) -->
    <div class="card mt-3" th:if="${judgment != null}">
        <div class="card-header">Ekstrahovani podaci</div>
        <div class="card-body">
            <dl class="row mb-2">
                <dt class="col-sm-3">Broj predmeta</dt><dd class="col-sm-9" th:text="${judgment.caseNumber}">-</dd>
                <dt class="col-sm-3">Sud</dt><dd class="col-sm-9" th:text="${judgment.court}">-</dd>
                <dt class="col-sm-3">Datum</dt><dd class="col-sm-9" th:text="${judgment.date}">-</dd>
                <dt class="col-sm-3">Sudije</dt><dd class="col-sm-9" th:text="${#strings.listJoin(judgment.judges, ', ')}">-</dd>
                <dt class="col-sm-3">Zapisničar</dt><dd class="col-sm-9" th:text="${judgment.recorder}">-</dd>
                <dt class="col-sm-3">Stranke</dt>
                <dd class="col-sm-9">
                    <span th:each="p,it : ${judgment.parties}"
                          th:text="${p.role} + ' ' + ${p.initials} + (${it.last} ? '' : ', ')">OKR AA</span>
                </dd>
                <dt class="col-sm-3">Prekršeni članovi (KZ)</dt>
                <dd class="col-sm-9">
                    <a th:each="a : ${judgment.referencedArticles}"
                       th:href="@{'/laws/kz'} + '#' + ${a}"
                       class="badge bg-secondary text-decoration-none me-1"
                       th:text="${a}">art</a>
                </dd>
            </dl>
            <div th:if="${judgment.extractedFacts != null and !judgment.extractedFacts.facts.isEmpty()}">
                <h6>Pravne činjenice</h6>
                <ul class="mb-0">
                    <li th:each="e : ${judgment.extractedFacts.facts}"
                        th:text="${e.key} + ' = ' + ${e.value}">predikat = vrednost</li>
                </ul>
            </div>
        </div>
    </div>

    <div class="judgment-content mt-4" th:utext="${judgmentHtml}"></div>
</main>
</body>
</html>
