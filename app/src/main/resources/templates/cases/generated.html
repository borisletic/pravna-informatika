<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="sr">
<head>
    <meta charset="UTF-8"/>
    <title>Generisana odluka</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container"><a class="navbar-brand" th:href="@{/}">Pravna informatika</a></div>
</nav>
<main class="container mt-4">
    <h1>Generisana odluka</h1>
    <p class="text-muted" th:if="${judgmentId != null}">
        Sačuvano kao: <code th:text="${judgmentId}"></code>
    </p>
    <pre class="border p-3 bg-light" style="white-space:pre-wrap;font-size:0.85rem;"
         th:text="${generatedXml}"></pre>
    <a th:href="@{/cases}" class="btn btn-secondary mt-3">Nazad</a>
</main>
</body>
</html>
